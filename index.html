<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <title>ヤギの鼻の中</title>
    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #000;
        touch-action: none;
        -webkit-user-select: none;
        user-select: none;
        position: fixed;
        inset: 0;
      }
      #app {
        position: fixed;
        inset: 0;
        width: 100vw;
        height: 100vh;
        height: 100dvh;
        overflow: hidden;
      }
      #app canvas {
        display: block;
        width: 100%;
        height: 100%;
      }
      #rotate-overlay {
        display: none;
        position: fixed;
        inset: 0;
        z-index: 10;
        background: #1a1216;
        color: #ffe9ec;
        font-family: sans-serif;
        font-size: 20px;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 24px;
        text-align: center;
      }
      #rotate-overlay .phone {
        width: 40px;
        height: 70px;
        border: 4px solid #ffe9ec;
        border-radius: 8px;
        animation: rotate-hint 1.6s ease-in-out infinite;
      }
      @keyframes rotate-hint {
        0%,
        20% {
          transform: rotate(0deg);
        }
        60%,
        100% {
          transform: rotate(90deg);
        }
      }
      /* タッチ端末の縦持ちでは横持ちを促す */
      @media (orientation: portrait) and (pointer: coarse) {
        #rotate-overlay {
          display: flex;
        }
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <div id="rotate-overlay">
      <div class="phone"></div>
      <div>スマホを横向きにしてプレイしてください</div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
